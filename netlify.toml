[build]
  command = "pnpm install --no-frozen-lockfile && pnpm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions.api]
  included_files = ["drizzle/**"]

# Keep the /api prefix so the Express app (mounted on /api/trpc, /api/auth/...)
# receives the exact same paths it already expects. See netlify/functions/api.ts.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

# SPA fallback for client-side routing (wouter).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
